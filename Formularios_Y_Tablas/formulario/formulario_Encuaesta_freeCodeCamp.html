<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
  </head>
  <body>
    <h1 id="title">freeCodeCamp Survey Form</h1>

    <p id="description">
      Thank you for taking the time to help us improve the platform
    </p>

    <form id="survey-form" action="">

      <label for="name" id="name-label"> Name </label>
      <input
        type="text"
        name="name"
        id="name"
        placeholder="Enter your name"
        required
      />

      <label for="email" id="email-label">Email</label>
      <input
        type="email"
        name="email"
        id="email"
        placeholder="Enter your Email"
        required
      />
    
    <label for="number" id="number-label">Age(optional)</label>
    <input
      type="number"
      id="number"
      name="number"
      placeholder="Age"
      min="10"
      max="60"
    />

    <label for="dropdown">What is your favorite feature of freeCodeCamp?</label>
    <select name="dropdown" id="dropdown">
      <option value="challenges">Challenges</option>
      <option value="projects">Projects</option>
    </select>

    <fieldset>
      <legend>Would you recommend freeCodeCamp to a friend?</legend>
      <input
        type="radio"
        id="definitely"
        name="recommend_feeCodeCamp"
        value="definitely"
      />
      <label for="">Definitely</label>
      <input
        type="radio"
        id="not-sure"
        name="recommend_feeCodeCamp"
        value="not-sure"
      />
      <label for="">Not sure</label>
    </fieldset>

    <fieldset>
      <legend>
        What would you like to see improved? (Check all that apply)
      </legend>
      <input
        type="checkbox"
        id="front-end"
        name="improvements"
        value="front-end"
      />
      <label for="">Front_end Projects</label>
      <input
        type="checkbox"
        id="back-end"
        name="improvements"
        value="back-end"
      />
      <label for="">Back-end Projects</label>
    </fieldset>

    <label for="comments">Any comments or suggestions?</label>
    <textarea name="comments" id="comments"></textarea>

    <button type="submit" id="submit">Submit</button>
    </form>
  </body>
</html>
