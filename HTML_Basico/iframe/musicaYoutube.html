<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musica Youtube</title>
  </head>
  <body>
    <main>
      <h1>Musica desde Youtube</h1>
      <p>
        En la siguiente pagina encontraras musica de diferentes generos
        obtenidos desde youtube.com
      </p>

      <section>
        <h2>Nanpa Basico</h2>
        <p>Cancion Oro por ti</p>
        <iframe
          src="https://youtu.be/_KKN6WGebGg?si=vEVQ5QFcMQsCub2K"
          frameborder="0"
          title="Oro por ti"
          height="300"
          width="600"
        ></iframe>
      </section>
      <section>
        <h2>Apocalyptica</h2>
        <p>Cancion Bittersweet</p>
        <iframe
          src="https://youtu.be/JAdDkFx0_6o?si=nfdLnWtlDDfPyEub"
          frameborder="0"
          title="Bittersweet"
          height="300"
          width="600"
        ></iframe>
      </section>
      <section>
        <h2>LP</h2>
        <p>Cancion Lost On You</p>
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/wDjeBNv6ip0?si=IOOXvn6iSZYgE1yw"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </section>
    </main>
  </body>
</html>
